<div class="container">
  <div class="card">
    <div class="card-header">
      <h3>✏️ Modifier l'utilisateur</h3>
      <a routerLink="/users" class="btn btn-secondary">⬅ Retour</a>
    </div>
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Prénom</label>
        <input formControlName="firstName" class="form-control" />
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input formControlName="lastName" class="form-control" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input formControlName="email" type="email" class="form-control" />
      </div>
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input formControlName="username" class="form-control" />
      </div>
      <div class="form-group">
        <label>Rôle</label>
        <select formControlName="role" class="form-control">
          <option value="ADMIN">Administrateur</option>
          <option value="INITIATEUR">Initiateur</option>
          <option value="VALIDATEUR">Validateur</option>
          <option value="FINANCE">Finance</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-success">💾 Enregistrer</button>
        <button type="button" class="btn btn-secondary" (click)="router.navigate(['/users'])">Annuler</button>
      </div>
    </form>
  </div>
</div>
