<div class="container">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">👤 Créer un utilisateur</h3>
      <a routerLink="/users" class="btn btn-secondary">⬅ Retour</a>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="username">Nom d'utilisateur *</label>
          <input
            id="username"
            type="text"
            class="form-control"
            formControlName="username"
            placeholder="Ex: johndoe"
            [class.is-invalid]="userForm.get('username')?.invalid && userForm.get('username')?.touched"
          >
          <div class="invalid-feedback" *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched">
            Le nom d'utilisateur doit contenir au moins 3 caractères
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="Ex: john@example.com"
            [class.is-invalid]="userForm.get('email')?.invalid && userForm.get('email')?.touched"
          >
          <div class="invalid-feedback" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
            Veuillez saisir un email valide
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe *</label>
        <input
          id="password"
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Minimum 6 caractères"
          [class.is-invalid]="userForm.get('password')?.invalid && userForm.get('password')?.touched"
        >
        <div class="invalid-feedback" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
          Le mot de passe doit contenir au moins 6 caractères
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Prénom *</label>
          <input
            id="firstName"
            type="text"
            class="form-control"
            formControlName="firstName"
            placeholder="Ex: John"
            [class.is-invalid]="userForm.get('firstName')?.invalid && userForm.get('firstName')?.touched"
          >
          <div class="invalid-feedback" *ngIf="userForm.get('firstName')?.invalid && userForm.get('firstName')?.touched">
            Le prénom est obligatoire
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Nom *</label>
          <input
            id="lastName"
            type="text"
            class="form-control"
            formControlName="lastName"
            placeholder="Ex: Doe"
            [class.is-invalid]="userForm.get('lastName')?.invalid && userForm.get('lastName')?.touched"
          >
          <div class="invalid-feedback" *ngIf="userForm.get('lastName')?.invalid && userForm.get('lastName')?.touched">
            Le nom est obligatoire
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="role">Rôle *</label>
        <select id="role" class="form-control" formControlName="role">
          <option *ngFor="let role of roles" [value]="role">
            {{ getRoleLabel(role) }}
          </option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-success btn-lg" [disabled]="loading">
          {{ loading ? 'Création en cours...' : '✅ Créer l\'utilisateur' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="router.navigate(['/users'])">
          Annuler
        </button>
      </div>
    </form>
  </div>
</div>
